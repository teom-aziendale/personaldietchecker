        :root {
            --bg-deep: #030f0f;
            --accent: #00df82;
            --white: #ffffff;
            --card-bg: #0a1a1a;
            --border: #142b2b;
            --text-muted: #526b6b;
            
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--white);
            min-height: 100vh;
            padding: calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 30px) 24px;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- NAV BAR --- */
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .back-btn:hover, .back-btn:active {
            color: var(--accent);
        }

        /* Badge Giorno Cliccabile */
        .day-badge-trigger {
            background: rgba(0, 223, 130, 0.08);
            border: 1px solid rgba(0, 223, 130, 0.2);
            color: var(--accent);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .day-badge-trigger:active {
            transform: scale(0.95);
            background: rgba(0, 223, 130, 0.15);
        }

        .profile-title {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        /* Banner Stato Sola Lettura */
        .read-only-banner {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        /* --- CARTE DEI PASTI (STILE CESCA) --- */
        .pasti-flow {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pasto-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .pasto-main-content {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .pasto-label {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Lista Alimenti Interna */
        .alimenti-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alimento-row {
            display: flex;
            align-items: center;
            width: 100%;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.95);
        }

        .alimento-dot {
            color: var(--accent);
            font-size: 1.2rem;
            margin-right: 8px;
            line-height: 1;
            flex-shrink: 0;
        }

        .alimento-emoji {
            margin-right: 8px;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .alimento-nome {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Fiammella per cottura in friggitrice */
        .alimento-nome.clickable {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-color: rgba(0, 223, 130, 0.4);
            text-underline-offset: 4px;
            transition: color 0.2s;
        }

        .alimento-nome.clickable:hover {
            color: var(--accent);
        }

        .airfryer-badge {
            margin-left: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-block;
        }

        /* Tratteggio dinamico */
        .alimento-leader {
            flex-grow: 1;
            border-bottom: 2px dotted rgba(82, 107, 107, 0.35);
            margin: 0 10px;
            position: relative;
            top: 4px;
            height: 1px;
        }

        .alimento-quantita {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            flex-shrink: 0;
            text-align: right;
        }

        /* --- CHECKBOX PREMIUM --- */
        .checkbox-container {
            position: relative;
            width: 34px;
            height: 34px;
            flex-shrink: 0;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .checkbox-container input:disabled {
            cursor: not-allowed;
        }

        .custom-checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 34px;
            width: 34px;
            background: transparent;
            border: 2px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .checkbox-container input:checked ~ .custom-checkmark {
            background-color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(0, 223, 130, 0.35);
        }

        .custom-checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 11px;
            top: 6px;
            width: 6px;
            height: 13px;
            border: solid var(--bg-deep);
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .custom-checkmark:after {
            display: block;
        }

        /* Stato completato per l'intera card */
        .pasto-card.completed {
            opacity: 0.35;
            border-color: transparent;
            background: rgba(10, 26, 26, 0.4);
        }

        .pasto-card.completed .alimento-nome {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* --- FINESTRE MODALI (OVERLAYS) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 380px;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transform: translateY(30px);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .modal-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: var(--white);
        }

        /* Stile Lista Giorni (Screenshot 1) */
        .day-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-option {
            background: rgba(10, 26, 26, 0.4);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-option.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 223, 130, 0.05);

            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;

            font-weight: 500;

            font-weight: 700;

        .modal-action-btn {
            background: var(--accent);
            color: var(--bg-deep);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 14px;
            transition: transform 0.15s ease;
        }

        .modal-action-btn:active {
            transform: scale(0.97);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        const giorniSettimana = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
        
        // Giorno reale di oggi
        const oggi = new Date();
        const nomeGiornoReale = giorniSettimana[oggi.getDay()];
        const stringaDataReale = oggi.toISOString().split('T')[0];

        // Giorno correntemente visualizzato dall'utente (inizialmente oggi)
        let giornoVisualizzato = nomeGiornoReale;

        // Riferimento Firestore secondo la REGOLA 1
        const appId = "webapp-dieta";
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'diete', 'teo');

        // Apri popup selezione giorno
        window.openDayModal = function() {
            renderDayModalOptions();
            document.getElementById("day-modal").classList.add("active");
        };

        // Chiudi popup selezione giorno
        window.closeDayModal = function() {
            document.getElementById("day-modal").classList.remove("active");
        };

        window.closeDayModalOutside = function(e) {
            if (e.target.id === "day-modal") {
                closeDayModal();
            }
        };

        // Cambia il giorno visualizzato
        window.selezionaGiorno = function(giorno) {
            giornoVisualizzato = giorno;
            closeDayModal();
            caricaEInizializzaPasti();
        };

        // Visualizza i dettagli della friggitrice ad aria
        window.mostraCottura = function(nomeCibo, metodo, temp, minuti) {
            document.getElementById("cooking-food-title").innerText = nomeCibo;
            const container = document.getElementById("cooking-details-body");
            container.innerHTML = `
                <div class="cooking-detail-item">
                    <span>💨 Metodo di cottura: <strong>${metodo}</strong></span>
                </div>
                <div class="cooking-detail-item">
                    <span>🌡️ Temperatura: <strong>${temp}</strong></span>
                </div>
                <div class="cooking-detail-item">
                    <span>⏱️ Minuti di cottura: <strong>${minuti}</strong></span>
                </div>
            `;
            document.getElementById("cooking-modal").classList.add("active");
        };

        window.closeCookingModal = function() {
            document.getElementById("cooking-modal").classList.remove("active");
        };

        window.closeCookingModalOutside = function(e) {
            if (e.target.id === "cooking-modal") {
                closeCookingModal();
            }
        };

        // Genera la lista dei giorni all'interno del menu di selezione (Stile Screenshot 1)
        function renderDayModalOptions() {
            const container = document.getElementById("day-options-container");
            container.innerHTML = "";

            // Giorni ordinati da Lunedì a Domenica
            const giorniOrdinati = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
            
            giorniOrdinati.forEach(giorno => {
                const isActive = (giorno === giornoVisualizzato);
                const isRealToday = (giorno === nomeGiornoReale);
                
                const btn = document.createElement("button");
                btn.className = `day-option ${isActive ? 'active' : ''}`;
                btn.onclick = () => selezionaGiorno(giorno);
                
                btn.innerHTML = `
                    <span>${giorno}</span>
                    ${isRealToday ? '<span style="font-size: 0.7rem; background: rgba(0,223,130,0.15); padding: 4px 8px; border-radius: 6px; color: var(--accent);">OGGI</span>' : ''}
                `;
                container.appendChild(btn);
            });
        }

        // Funzione principale di rendering e logica di rete
        async function caricaEInizializzaPasti() {
            const isToday = (giornoVisualizzato === nomeGiornoReale);
            
            // Aggiorna interfaccia superiore
            document.getElementById("badge-text").innerText = giornoVisualizzato;
            
            // Gestione avviso sola lettura
            const notice = document.getElementById("read-only-notice");
            if (!isToday) {
                notice.style.display = "flex";
                notice.querySelector('span:last-child').innerText = `Sola Lettura. I pasti del ${giornoVisualizzato} non sono modificabili (oggi è ${nomeGiornoReale}).`;
            } else {
                notice.style.display = "none";
            }

            let statiCheckbox = {};

            // Recupera lo stato da Firestore solo se stiamo guardando oggi
            if (isToday) {
                try {
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const datiCloud = docSnap.data();
                        // Se la data salvata è diversa da oggi, resettiamo le checkbox per la nuova giornata
                        if (datiCloud.last_date !== stringaDataReale) {
                            await setDoc(docRef, { last_date: stringaDataReale, pasti: {} });
                        } else {
                            statiCheckbox = datiCloud.pasti || {};
                        }
                    } else {
                        // Crea documento iniziale
                        await setDoc(docRef, { last_date: stringaDataReale, pasti: {} });
                    }
                } catch (e) {
                    console.log("Firestore offline o errore di connessione.");
                }
            }

            // Render dei pasti del giorno selezionato
            const pastiDelGiorno = dietaTeo[giornoVisualizzato] || [];
            const container = document.getElementById("pasti-container");
            container.innerHTML = "";

            pastiDelGiorno.forEach(pasto => {
                const isChecked = isToday ? (statiCheckbox[pasto.id] || false) : false;
                
                const card = document.createElement("div");
                card.id = `card-${pasto.id}`;
                card.className = `pasto-card ${isChecked ? 'completed' : ''}`;

                // Generazione della lista dei singoli cibi all'interno del pasto
                let alimentiHTML = "";
                pasto.alimenti.forEach(alimento => {
                    const haAirfryer = !!alimento.airFryer;
                    const clickAttr = haAirfryer 
                        ? `onclick="mostraCottura('${alimento.nome.replace(/'/g, "\\'")}', '${alimento.airFryer.metodo}', '${alimento.airFryer.temp}', '${alimento.airFryer.minuti}')"` 
                        : "";
                    const airfryerFlame = haAirfryer ? `<span class="airfryer-badge" ${clickAttr}>🔥</span>` : "";

                    alimentiHTML += `
                        <div class="alimento-row">
                            <span class="alimento-dot">•</span>
                            <span class="alimento-emoji">${alimento.emoji}</span>
                            <span class="alimento-nome ${haAirfryer ? 'clickable' : ''}" ${clickAttr}>
                                ${alimento.nome}
                            </span>
                            ${airfryerFlame}
                            <span class="alimento-leader"></span>
                            <span class="alimento-quantita">${alimento.quantita}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="pasto-main-content">
                        <span class="pasto-label">${pasto.tipo}</span>
                        <div class="alimenti-list">
                            ${alimentiHTML}
                        </div>
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" id="check-${pasto.id}" ${isChecked ? 'checked' : ''} ${!isToday ? 'disabled' : ''}>
                        <span class="custom-checkmark"></span>
                    </div>
                `;

                container.appendChild(card);

                // Aggiungi event listener solo per il giorno corrente
                if (isToday) {
                    const input = card.querySelector(`input[type="checkbox"]`);
                    input.addEventListener('change', async (e) => {
                        const checked = e.target.checked;
                        if (checked) {
                            card.classList.add('completed');
                        } else {
                            card.classList.remove('completed');
                        }

                        try {
                            await updateDoc(docRef, {
                                [`pasti.${pasto.id}`]: checked
                            });
                        } catch (err) {
                            console.error("Errore nel salvataggio su Firebase:", err);
                        }
                    });
                }
            });
        }

        // Avvio dell'app su carica pagina
        window.onload = function() {
            caricaEInizializzaPasti();
        };
    </script>
