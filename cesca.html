        :root {
            --bg-deep: #030f0f;
            --accent: #00df82;
            --white: #ffffff;
            --card-bg: #0a1a1a;
            --border: #142b2b;
            --text-muted: #526b6b;
            
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--white);
            min-height: 100vh;
            padding: calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 30px) 24px;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Blocca tassativamente lo scorrimento orizzontale */
        }

        /* --- NAV BAR --- */
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .back-btn:hover, .back-btn:active {
            color: var(--accent);
        }

        .day-badge-trigger {
            background: rgba(0, 223, 130, 0.08);
            border: 1px solid rgba(0, 223, 130, 0.2);
            color: var(--accent);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .day-badge-trigger:active {
            transform: scale(0.95);
            background: rgba(0, 223, 130, 0.15);
        }

        .profile-title {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        /* Banner Stato Sola Lettura */
        .read-only-banner {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        /* --- LISTA PASTI --- */
        .pasti-flow {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .pasto-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            width: 100%;
        }

        .pasto-main-content {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
            min-width: 0; /* CRITICO: Impedisce alla card di allargarsi oltre lo schermo su iOS */
        }

        .pasto-label {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Lista Alimenti Interna */
        .alimenti-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .alimento-row {
            display: flex;
            align-items: center;
            width: 100%;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.95);
            min-width: 0; /* CRITICO: Forza il rispetto dei confini della riga */
        }

        .alimento-dot {
            color: var(--accent);
            font-size: 1.2rem;
            margin-right: 8px;
            line-height: 1;
            flex-shrink: 0;
        }

        .alimento-emoji {
            margin-right: 8px;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .alimento-nome {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Attiva correttamente i tre puntini se il nome è troppo lungo */
            flex-shrink: 1;
            min-width: 0; /* CRITICO: Dice a WebKit che il testo può rimpicciolirsi */
        }

        /* Tratteggio Leader-dots */
        .alimento-leader {
            flex-grow: 1;
            flex-shrink: 1;
            min-width: 10px; /* Garantisce che i puntini non spariscano mai del tutto */
            border-bottom: 2px dotted rgba(82, 107, 107, 0.35);
            margin: 0 10px;
            position: relative;
            top: -2px;
            height: 1px;
        }

        .alimento-quantita {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            flex-shrink: 0;
            text-align: right;
        }

        /* --- CHECKBOX PREMIUM --- */
        .checkbox-container {
            position: relative;
            width: 34px;
            height: 34px;
            flex-shrink: 0;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .checkbox-container input:disabled {
            cursor: not-allowed;
        }

        .custom-checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 34px;
            width: 34px;
            background: transparent;
            border: 2px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .checkbox-container input:checked ~ .custom-checkmark {
            background-color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(0, 223, 130, 0.35);
        }

        .custom-checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 11px;
            top: 6px;
            width: 6px;
            height: 13px;
            border: solid var(--bg-deep);
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .custom-checkmark:after {
            display: block;
        }

        /* Stato completato */
        .pasto-card.completed {
            opacity: 0.35;
            border-color: transparent;
            background: rgba(10, 26, 26, 0.4);
        }

        .pasto-card.completed .alimento-nome {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* --- FINESTRE MODALI (OVERLAYS) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 380px;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transform: translateY(30px);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .modal-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: var(--white);
        }

        /* Lista Giorni */
        .day-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-option {
            background: rgba(10, 26, 26, 0.4);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-option.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 223, 130, 0.05);
        }

        .day-option:active {
            transform: scale(0.98);
            background: rgba(0, 223, 130, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                    ]
                },
                {
                    id: "c_dom_spu", tipo: "Spuntino",
                    alimenti: [
                        { emoji: "🍪", nome: "Biscotti", quantita: "6 pz" }
                    ]
                }
            ]
        };

        const giorniSettimana = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
        const oggi = new Date();
        const nomeGiornoReale = giorniSettimana[oggi.getDay()];
        const stringaDataReale = oggi.toISOString().split('T')[0];

        let giornoVisualizzato = nomeGiornoReale;
        const docRef = doc(db, "diete", "cesca");

        window.openDayModal = function() {
            renderDayModalOptions();
            document.getElementById("day-modal").classList.add("active");
        };

        window.closeDayModal = function() {
            document.getElementById("day-modal").classList.remove("active");
        };

        window.closeDayModalOutside = function(e) {
            if (e.target.id === "day-modal") closeDayModal();
        };

        window.selezionaGiorno = function(giorno) {
            giornoVisualizzato = giorno;
            closeDayModal();
            caricaEInizializzaPasti();
        };

        function renderDayModalOptions() {
            const container = document.getElementById("day-options-container");
            container.innerHTML = "";
            const giorniOrdinati = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
            
            giorniOrdinati.forEach(giorno => {
                const isActive = (giorno === giornoVisualizzato);
                const isRealToday = (giorno === nomeGiornoReale);
                
                const btn = document.createElement("button");
                btn.className = `day-option ${isActive ? 'active' : ''}`;
                btn.onclick = () => selezionaGiorno(giorno);
                
                btn.innerHTML = `
                    <span>${giorno}</span>
                    ${isRealToday ? '<span style="font-size: 0.7rem; background: rgba(0,223,130,0.15); padding: 4px 8px; border-radius: 6px; color: var(--accent);">OGGI</span>' : ''}
                `;
                container.appendChild(btn);
            });
        }

        async function caricaEInizializzaPasti() {
            const isToday = (giornoVisualizzato === nomeGiornoReale);
            document.getElementById("badge-text").innerText = giornoVisualizzato;
            
            const notice = document.getElementById("read-only-notice");
            if (!isToday) {
                notice.style.display = "flex";
                notice.querySelector('span:last-child').innerText = `Sola Lettura. I pasti del ${giornoVisualizzato} non sono modificabili (oggi è ${nomeGiornoReale}).`;
            } else {
                notice.style.display = "none";
            }

            let statiCheckbox = {};

            if (isToday) {
                try {
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const datiCloud = docSnap.data();
                        if (datiCloud.last_date !== stringaDataReale) {
                            await setDoc(docRef, { last_date: stringaDataReale, pasti: {} });
                        } else {
                            statiCheckbox = datiCloud.pasti || {};
                        }
                    } else {
                        await setDoc(docRef, { last_date: stringaDataReale, pasti: {} });
                    }
                } catch (e) {
                    console.log("Firestore offline o non configurato.");
                }
            }

            const pastiDelGiorno = dietaCesca[giornoVisualizzato] || [];
            const container = document.getElementById("pasti-container");
            container.innerHTML = "";

            pastiDelGiorno.forEach(pasto => {
                const isChecked = isToday ? (statiCheckbox[pasto.id] || false) : false;
                
                const card = document.createElement("div");
                card.id = `card-${pasto.id}`;
                card.className = `pasto-card ${isChecked ? 'completed' : ''}`;

                let alimentiHTML = "";
                pasto.alimenti.forEach(alimento => {
                    alimentiHTML += `
                        <div class="alimento-row">
                            <span class="alimento-dot">•</span>
                            <span class="alimento-emoji">${alimento.emoji}</span>
                            <span class="alimento-nome">${alimento.nome}</span>
                            <span class="alimento-leader"></span>
                            <span class="alimento-quantita">${alimento.quantita}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="pasto-main-content">
                        <span class="pasto-label">${pasto.tipo}</span>
                        <div class="alimenti-list">
                            ${alimentiHTML}
                        </div>
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" id="check-${pasto.id}" ${isChecked ? 'checked' : ''} ${!isToday ? 'disabled' : ''}>
                        <span class="custom-checkmark"></span>
                    </div>
                `;

                container.appendChild(card);

                if (isToday) {
                    const input = card.querySelector(`input[type="checkbox"]`);
                    input.addEventListener('change', async (e) => {
                        const checked = e.target.checked;
                        if (checked) {
                            card.classList.add('completed');
                        } else {
                            card.classList.remove('completed');
                        }

                        try {
                            await updateDoc(docRef, {
                                [`pasti.${pasto.id}`]: checked
                            });
                        } catch (err) {
                            console.error("Errore salvataggio Firebase:", err);
                        }
                    });
                }
            });
        }

        // Avvio immediato
        caricaEInizializzaPasti();
    </script>
</body>
</html>
